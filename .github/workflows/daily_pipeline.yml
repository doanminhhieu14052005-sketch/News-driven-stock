name: Daily News-driven Stock Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "30 10 * * *"

permissions:
  contents: write

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Module 5 VNStock
        run: |
          END_DATE=$(date +%F)
          python VNStock/module5_vnstock_price.py --start-date 2024-01-01 --end-date "$END_DATE" --output-dir VNStock/data/processed

      - name: Export CafeF articles from MongoDB
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          MONGO_DB_NAME: ${{ secrets.MONGO_DB_NAME }}
          MONGO_COLLECTION: ${{ secrets.MONGO_COLLECTION }}
        run: |
          python module6_session_bucket/export_cafef_from_mongo.py --output data/raw/articles.csv

      - name: Run Module 6 session mapper
        run: |
          python module6_session_bucket/session_mapper.py --articles-input data/raw/articles.csv --trading-calendar VNStock/data/processed/daily_sector_price_wide.csv --output data/processed/articles_session_mapped.csv

      - name: Run Module 7 sector sentiment mapper
        run: |
          python module7_sector_sentiment/cafef_sector_sentiment_mapper.py --input data/processed/articles_session_mapped.csv --output data/processed/cafef_articles_labeled.csv --long-output data/processed/cafef_article_sector_long.csv

      - name: Run Module 8 daily sector sentiment aggregation
        run: |
          python module8_daily_sentiment/daily_sector_sentiment_aggregator.py --input data/processed/cafef_article_sector_long.csv --output-long data/processed/daily_sector_sentiment_long.csv --output-wide data/processed/daily_sector_sentiment_wide.csv

      - name: Run Module 9 merge sentiment and returns
        run: |
          python module9_merge_sentiment_return/merge_sentiment_return.py --price-wide VNStock/data/processed/daily_sector_price_wide.csv --sentiment-wide data/processed/daily_sector_sentiment_wide.csv --sentiment-long data/processed/daily_sector_sentiment_long.csv --output-wide data/processed/merged_sentiment_return_wide.csv --output-long data/processed/merged_sentiment_return_long.csv --coverage-report data/processed/merge_coverage_report.csv

      - name: Run Module 10 Granger causality
        run: |
          python module10_granger/granger_causality.py --input data/processed/merged_sentiment_return_wide.csv --stationarity-output data/processed/stationarity_tests.csv --all-lags-output data/processed/granger_all_lags.csv --results-output data/processed/granger_results.csv --pvalue-matrix-output data/processed/granger_pvalue_matrix.csv --fdr-matrix-output data/processed/granger_fdr_matrix.csv --adjacency-output data/processed/granger_adjacency_matrix.csv --edge-list-output data/processed/granger_edge_list.csv --max-lag 5 --min-observations 60 --alpha 0.05

      - name: Run Module 11 Granger network visualization
        run: |
          python module11_network/build_granger_network.py --granger-results data/processed/granger_results.csv --pvalue-matrix data/processed/granger_pvalue_matrix.csv --fdr-matrix data/processed/granger_fdr_matrix.csv --adjacency-matrix data/processed/granger_adjacency_matrix.csv --output-dir data/processed --figures-dir reports/figures --alpha 0.05

      - name: Verify pipeline outputs
        run: |
          test -f VNStock/data/processed/daily_sector_price_wide.csv
          test -f VNStock/data/processed/daily_sector_price_long.csv
          test -f data/processed/articles_session_mapped.csv
          test -f data/processed/cafef_articles_labeled.csv
          test -f data/processed/cafef_article_sector_long.csv
          test -f data/processed/daily_sector_sentiment_long.csv
          test -f data/processed/daily_sector_sentiment_wide.csv
          test -f data/processed/merged_sentiment_return_wide.csv
          test -f data/processed/merged_sentiment_return_long.csv
          test -f data/processed/merge_coverage_report.csv
          test -f data/processed/stationarity_tests.csv
          test -f data/processed/granger_all_lags.csv
          test -f data/processed/granger_results.csv
          test -f data/processed/granger_pvalue_matrix.csv
          test -f data/processed/granger_fdr_matrix.csv
          test -f data/processed/granger_adjacency_matrix.csv
          test -f data/processed/granger_edge_list.csv
          test -f data/processed/network_edges_raw.csv
          test -f data/processed/network_edges_fdr.csv
          test -f data/processed/network_node_metrics_raw.csv
          test -f data/processed/network_node_metrics_fdr.csv
          test -f data/processed/network_summary.csv
          test -f reports/figures/granger_network_raw.png
          test -f reports/figures/granger_network_fdr.png
          test -f reports/figures/granger_pvalue_heatmap.png
          test -f reports/figures/granger_fdr_heatmap.png
          test -f reports/figures/granger_raw_adjacency_heatmap.png
          test -f reports/figures/granger_fdr_adjacency_heatmap.png
          python - << 'PY'
          from pathlib import Path
          import pandas as pd

          wide = pd.read_csv("VNStock/data/processed/daily_sector_price_wide.csv")
          long = pd.read_csv("VNStock/data/processed/daily_sector_price_long.csv")
          mapped = pd.read_csv("data/processed/articles_session_mapped.csv", encoding="utf-8-sig")
          labeled = pd.read_csv("data/processed/cafef_articles_labeled.csv", encoding="utf-8-sig")
          sector_long = pd.read_csv("data/processed/cafef_article_sector_long.csv", encoding="utf-8-sig")
          sentiment_long = pd.read_csv("data/processed/daily_sector_sentiment_long.csv", encoding="utf-8-sig")
          sentiment_wide = pd.read_csv("data/processed/daily_sector_sentiment_wide.csv", encoding="utf-8-sig")
          merged_wide = pd.read_csv("data/processed/merged_sentiment_return_wide.csv", encoding="utf-8-sig")
          merged_long = pd.read_csv("data/processed/merged_sentiment_return_long.csv", encoding="utf-8-sig")
          coverage = pd.read_csv("data/processed/merge_coverage_report.csv", encoding="utf-8-sig")
          stationarity = pd.read_csv("data/processed/stationarity_tests.csv", encoding="utf-8-sig")
          all_lags = pd.read_csv("data/processed/granger_all_lags.csv", encoding="utf-8-sig")
          granger_results = pd.read_csv("data/processed/granger_results.csv", encoding="utf-8-sig")
          pvalue_matrix = pd.read_csv("data/processed/granger_pvalue_matrix.csv", encoding="utf-8-sig")
          fdr_matrix = pd.read_csv("data/processed/granger_fdr_matrix.csv", encoding="utf-8-sig")
          adjacency_matrix = pd.read_csv("data/processed/granger_adjacency_matrix.csv", encoding="utf-8-sig")
          edge_list = pd.read_csv("data/processed/granger_edge_list.csv", encoding="utf-8-sig")
          network_edges_raw = pd.read_csv("data/processed/network_edges_raw.csv", encoding="utf-8-sig")
          network_edges_fdr = pd.read_csv("data/processed/network_edges_fdr.csv", encoding="utf-8-sig")
          network_metrics_raw = pd.read_csv("data/processed/network_node_metrics_raw.csv", encoding="utf-8-sig")
          network_metrics_fdr = pd.read_csv("data/processed/network_node_metrics_fdr.csv", encoding="utf-8-sig")
          network_summary = pd.read_csv("data/processed/network_summary.csv", encoding="utf-8-sig")

          print("price wide shape:", wide.shape)
          print("price long shape:", long.shape)
          print("mapped articles shape:", mapped.shape)
          print("cafef_articles_labeled shape:", labeled.shape)
          print("cafef_article_sector_long shape:", sector_long.shape)
          print("daily_sector_sentiment_long shape:", sentiment_long.shape)
          print("daily_sector_sentiment_wide shape:", sentiment_wide.shape)
          print("merged wide shape:", merged_wide.shape)
          print("merged long shape:", merged_long.shape)
          print("coverage report shape:", coverage.shape)
          print("stationarity tests shape:", stationarity.shape)
          print("granger all lags shape:", all_lags.shape)
          print("granger results shape:", granger_results.shape)
          print("granger pvalue matrix shape:", pvalue_matrix.shape)
          print("granger fdr matrix shape:", fdr_matrix.shape)
          print("granger adjacency matrix shape:", adjacency_matrix.shape)
          print("granger edge list shape:", edge_list.shape)
          print("network_edges_raw shape:", network_edges_raw.shape)
          print("network_edges_fdr shape:", network_edges_fdr.shape)
          print("network node metrics raw shape:", network_metrics_raw.shape)
          print("network node metrics fdr shape:", network_metrics_fdr.shape)
          print("network summary:")
          print(network_summary.to_string(index=False))

          wide["trade_date"] = pd.to_datetime(wide["trade_date"], errors="coerce")
          price_dates = wide["trade_date"].dropna()
          if len(price_dates) == 0:
              raise RuntimeError("No valid trade_date found in price wide CSV")
          print("price date range:", price_dates.min().date(), "->", price_dates.max().date())

          if "trade_date" not in mapped.columns:
              raise RuntimeError("Missing trade_date column in articles_session_mapped.csv")

          mapped["trade_date"] = pd.to_datetime(mapped["trade_date"], errors="coerce")
          valid_article_dates = mapped["trade_date"].dropna()

          print("mapped articles null trade_date:", mapped["trade_date"].isna().sum())

          if len(valid_article_dates) == 0:
              raise RuntimeError("No valid trade_date found in articles_session_mapped.csv")

          print(
              "mapped articles date range:",
              valid_article_dates.min().date(),
              "->",
              valid_article_dates.max().date(),
          )

          if "session_bucket" in mapped.columns:
              print("session_bucket distribution:")
              print(mapped["session_bucket"].value_counts(dropna=False).to_string())

          if "sentiment_score" in labeled.columns:
              print("sentiment_score distribution:")
              print(labeled["sentiment_score"].value_counts(dropna=False).to_string())

          if "sector_label" in sector_long.columns:
              print("sector_label distribution in long output:")
              print(sector_long["sector_label"].value_counts(dropna=False).to_string())

          if "sector_label" in labeled.columns:
              print("unmapped article count:", int((labeled["sector_label"] == "Unmapped").sum()))

          if "trade_date" not in sentiment_wide.columns:
              raise RuntimeError("Missing trade_date in daily_sector_sentiment_wide.csv")
          sentiment_wide["trade_date"] = pd.to_datetime(sentiment_wide["trade_date"], errors="coerce")
          sentiment_dates = sentiment_wide["trade_date"].dropna()
          if len(sentiment_dates) == 0:
              raise RuntimeError("No valid trade_date found in daily_sector_sentiment_wide.csv")
          print("sentiment date range:", sentiment_dates.min().date(), "->", sentiment_dates.max().date())
          sentiment_sector_columns = [column for column in sentiment_wide.columns if column != "trade_date"]
          print("sentiment sector columns:", sentiment_sector_columns)
          print("sentiment missing ratio:", sentiment_wide[sentiment_sector_columns].isna().mean().mean())
          print("daily sentiment long sample:")
          print(sentiment_long.head().to_string(index=False))
          print("daily sentiment wide sample:")
          print(sentiment_wide.head().to_string(index=False))

          if "trade_date" not in merged_wide.columns:
              raise RuntimeError("Missing trade_date in merged_sentiment_return_wide.csv")
          merged_wide["trade_date"] = pd.to_datetime(merged_wide["trade_date"], errors="coerce")
          merged_dates = merged_wide["trade_date"].dropna()
          if len(merged_dates) == 0:
              raise RuntimeError("No valid trade_date found in merged_sentiment_return_wide.csv")
          ret_cols = [column for column in merged_wide.columns if column.startswith("ret_")]
          sent_cols = [column for column in merged_wide.columns if column.startswith("sent_")]
          print("merged date range:", merged_dates.min().date(), "->", merged_dates.max().date())
          print("merged return missing ratio:", merged_wide[ret_cols].isna().mean().mean())
          print("merged sentiment missing ratio:", merged_wide[sent_cols].isna().mean().mean())
          print("merged wide sample:")
          print(merged_wide.head().to_string(index=False))
          print("merged long sample:")
          print(merged_long.head().to_string(index=False))
          print("coverage report sample:")
          print(coverage.head().to_string(index=False))
          if "significant_fdr_05" in granger_results.columns:
              print("granger significant FDR edge count:", int(granger_results["significant_fdr_05"].sum()))
          if not edge_list.empty:
              print("top Granger edges:")
              print(edge_list.head(10).to_string(index=False))
          else:
              print("top Granger edges: none")
          if not network_edges_raw.empty:
              print("top 10 raw network edges:")
              print(network_edges_raw.sort_values("edge_weight", ascending=False).head(10).to_string(index=False))
          else:
              print("top 10 raw network edges: none")
          figure_paths = [
              "reports/figures/granger_network_raw.png",
              "reports/figures/granger_network_fdr.png",
              "reports/figures/granger_pvalue_heatmap.png",
              "reports/figures/granger_fdr_heatmap.png",
              "reports/figures/granger_raw_adjacency_heatmap.png",
              "reports/figures/granger_fdr_adjacency_heatmap.png",
          ]
          print("figure file sizes:")
          for figure_path in figure_paths:
              path = Path(figure_path)
              size = path.stat().st_size
              if size <= 0:
                  raise RuntimeError(f"Figure is empty: {figure_path}")
              print(figure_path, size)

          print("Verification completed successfully.")
          PY

      - name: Commit and push processed outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add VNStock/data/processed/*.csv
          git add data/processed/*.csv
          git add reports/figures/*.png

          if git diff --cached --quiet; then
            echo "No processed data changes to commit"
          else
            git commit -m "Update processed pipeline outputs"
            git push
          fi
